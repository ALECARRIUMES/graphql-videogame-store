apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: videogame-store
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ALECARRIUMES/graphql-videogame-store.git
    targetRevision: assignment-08
    path: k8s/app
  destination:
    server: https://kubernetes.default.svc
    namespace: videogame-store
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
